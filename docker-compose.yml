version: "3.8"

services:
  # ============================================
  # MySQL Database
  # ============================================
  db:
    image: mysql:8.0
    container_name: skillnet-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: skillnet
      MYSQL_USER: skillnet
      MYSQL_PASSWORD: Skillnet@123
    ports:
      - "3306:3306"
    volumes:
      - skillnet-db-data:/var/lib/mysql
      - ./db/docker-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/skillnet_full_dump.sql:/docker-entrypoint-initdb.d/02-dump.sql
    networks:
      - skillnet-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================
  # Backend Server (Port 5001)
  # ============================================
  backend:
    build:
      context: ./backend/server
      dockerfile: Dockerfile
    container_name: skillnet-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: skillnet
      DB_PASSWORD: Skillnet@123
      DB_NAME: skillnet
      DB_PORT: 3306
      PORT: 5001
      JWT_SECRET: supersecretjwtkey123
      ML_API_URL: http://team-recommender:5002
      ML_API_URL_PROJECT: http://project-matcher:5003
      RECRUITER_ENGINE_URL: http://recruiter-engine:5004
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - skillnet-network

  # ============================================
  # API Gateway (Port 5000)
  # ============================================
  api-gateway:
    build:
      context: ./backend/apiGateway
      dockerfile: Dockerfile
    container_name: skillnet-api-gateway
    restart: unless-stopped
    environment:
      PORT: 5000
      BACKEND_BASE_URL: http://backend:5001
      JWT_SECRET: supersecretjwtkey123
    ports:
      - "5000:5000"
    depends_on:
      - backend
    networks:
      - skillnet-network

  # ============================================
  # Frontend (Port 3000)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillnet-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - skillnet-network

  # ============================================
  # Team Recommender ML Model (Port 5002)
  # ============================================
  team-recommender:
    build:
      context: ./models/teamRecommenderNew
      dockerfile: Dockerfile
    container_name: skillnet-team-recommender
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: skillnet
      DB_PASSWORD: Skillnet@123
      DB_NAME: skillnet
    ports:
      - "5002:5002"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - skillnet-network

  # ============================================
  # Project Matcher ML Model (Port 5003)
  # ============================================
  project-matcher:
    build:
      context: ./models/projectMatcherNew
      dockerfile: Dockerfile
    container_name: skillnet-project-matcher
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: skillnet
      DB_PASSWORD: Skillnet@123
      DB_NAME: skillnet
    ports:
      - "5003:5003"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - skillnet-network

  # ============================================
  # Recruiter Engine ML Model (Port 5004)
  # ============================================
  recruiter-engine:
    build:
      context: ./models/recruiterEngine
      dockerfile: Dockerfile
    container_name: skillnet-recruiter-engine
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: skillnet
      DB_PASSWORD: Skillnet@123
      DB_NAME: skillnet
    ports:
      - "5004:5004"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - skillnet-network

# ============================================
# Networks
# ============================================
networks:
  skillnet-network:
    driver: bridge
    name: skillnet-network

# ============================================
# Volumes
# ============================================
volumes:
  skillnet-db-data:
    name: skillnet-db-data
